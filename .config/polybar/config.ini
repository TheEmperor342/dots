; Config from this unixporn post (I did modify it a little):
; https://www.reddit.com/r/unixporn/comments/spaws0/bspwm_catppuccin_rice/

[global/wm]
margin-top    = 0
margin-bottom = 0 
include-file = $HOME/.config/polybar/colors.ini
include-file = $HOME/.config/polybar/modules.ini

[bar/main]
width = 100%
height = 24pt
padding-left = 1
margin-left = 1
radius = 5
;fixed-center = true
; monitor = eDP-1-1
background = ${colors.bg}
foreground = ${colors.fg}

border-size  = 10
border-color = ${colors.tp}

#padding       = 2
module-margin = 1

font-0 = CaskaydiaCove Nerd Font:style=Medium:size=11;2
font-1 = sucklessfont_v2.1:style=Regular;size=15;2

modules-left    = menu workspaces 
modules-center  = time
modules-right   = pulseaudio memory battery

wm-restack = bspwm

cursor-click  = pointer

tray-detached = false 
tray-position = right
tray-offset-x = -4.5
tray-maxsize = 20

[settings]
screenchange-reload = true
